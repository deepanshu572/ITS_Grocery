<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITS-grocery</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.35.0/tabler-icons.min.css"
      integrity="sha512-gzw5zNP2TRq+DKyAqZfDclaTG4dOrGJrwob2Fc8xwcJPDPVij0HowLIMZ8c1NefFM0OZZYUUUNoPfcoI5jqudw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="main animate-fade-in margin_box">
      <div class="search_header">
        <div class="serch_bar reuse_search">

          <i class="ti ti-chevron-left" onclick="history.back()"></i>
          <input
            oninput="handleInput(event)"
            type="search"
            id="searchInput"
            placeholder="Search here..."
          />
          <div class="line_search"></div>
          <div class="mic_wrap" id="load">
            <!-- <span class="loader"></span> -->
            <i class="ti ti-microphone"></i>
          </div>
        </div>
      </div>
      <div class="reuse_product product_design_sec_wrap search_data_wrap">
          <div class="search_data product_wrapper" id="searchData">
       
      </div>
      <div id="notFound"></div>
          </div>

      
      
    </div>

 

      <div id="cartPopup">
      <div
        class="cart_popup"
        onclick="location.href='cart.html'">

        <div class="cart_left">
          <h6>View cart</h6>
          <p><b id="cartQty"></b> item</p>
        </div>

        <div class="cart_right">
          <i class="ti ti-chevrons-right"></i>
        </div>

      </div>
    </div>



        <div
      class="offcanvas offcanvas-bottom varient_data_canvas"
      tabindex="-1"
      id="offcanvasVarient"
      aria-labelledby="offcanvasVarientLabel"
    >
      <div class="offcanvas-body small">
        <h4>Select Varient</h4>
        <div class="varient_data" id="varientData"></div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../assets/js/script.js"></script>
  </body>
</html>
