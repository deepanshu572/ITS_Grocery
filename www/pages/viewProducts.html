  <body>
    <div class="main margin_box animate-fade-in">
      <div class="back_btn" onclick="history.back()">

        <div class="reuse_product product_design_sec_wrap search_data_wrap">

          </div>

   


    
       <div class="footer_tab">

      <div id="cartPopup">

        </div>

        <div class="varient_data" id="varientData"></div>
