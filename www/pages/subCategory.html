<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITS-grocery</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.35.0/tabler-icons.min.css"
      integrity="sha512-gzw5zNP2TRq+DKyAqZfDclaTG4dOrGJrwob2Fc8xwcJPDPVij0HowLIMZ8c1NefFM0OZZYUUUNoPfcoI5jqudw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
      integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="main margin_box animate-fade-in">
      <div class="back_btn subCatBack">
        <div class="left_menu" onclick="history.back()">
          <div class="back_btn_arrow">
            <i class="ti ti-arrow-narrow-left"></i>
          </div>
          <h5>Category</h5>
        </div>
        <div
          class="icon_filter"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasBottomFilter"
          aria-controls="offcanvasBottomFilter"
                    onclick="renderRightFilter('Sort By')"

        >
          <i class="ri-filter-3-fill"></i>
        </div>
      </div>

      <div class="sub_category_wrapper">
        <div class="sub_category_left" id="subCategory"></div>
        <div class="sub_category_right" id="subCategoryProductData"></div>
      </div>

      <div id="cartPopup">
        <div class="cart_popup" onclick="location.href = 'cart.html'">
          <div class="cart_left">
            <h6>View cart</h6>
            <p><b id="cartQty"></b> item</p>
          </div>

          <div class="cart_right">
            <i class="ti ti-chevrons-right"></i>
          </div>
        </div>
      </div>
      <div class="footer_tab">
        <div class="foot_tab" onclick="location.href = 'home.html'">
          <i class="ri-home-5-line"></i>
        </div>
        <div class="foot_tab" onclick="location.href = 'category.html'">
          <i class="ri-apps-line"></i>
        </div>
        <div class="foot_tab circle"></div>
        <div class="foot_tab" onclick="location.href = 'orders.html'">
          <i class="ri-shopping-bag-4-line"></i>
        </div>
        <div class="foot_tab" onclick="location.href = 'profile.html'">
          <i class="ri-user-3-line"></i>
        </div>
      </div>
    </div>

    <div
      class="offcanvas offcanvas-bottom varient_data_canvas"
      tabindex="-1"
      id="offcanvasVarient"
      aria-labelledby="offcanvasVarientLabel"
    >
      <div class="offcanvas-body small">
        <h4>Select Varient</h4>
        <div class="varient_data" id="varientData"></div>
      </div>
    </div>

    <div
      class="offcanvas offcanvas-bottom"
      tabindex="-1"
      id="offcanvasBottomFilter"
      aria-labelledby="offcanvasBottomFilterLabel"
    >
      <div class="offcanvas-header filter_data_header">
        <h5>Filter</h5>
        <button type="button" data-bs-dismiss="offcanvas" aria-label="Close">
          <i class="ri-close-line"></i>
        </button>
      </div>
      <div class="offcanvas-body small filter_wrapper">
        <div class="left_filter">
          <!-- <div class="left_filter_btn_wrap active_filter">
            <div class="line_filter"></div>
            <button>Brands</button>
          </div> -->
          <div class="left_filter_btn_wrap active_filter">
            <div class="line_filter"></div>
            <button>Sort By</button>
          </div>
        </div>
        <div class="right_filter" id="rightFilterOption">
          
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script src="../assets/js/script.js"></script>

    <script>
      getSingleCategory();
    </script>
  </body>
</html>
