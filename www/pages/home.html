  <body>
    <div class="main">
      <div class="header_nav">
        <div class="top_wrap">
          <div class="header_top_wrap">
            <div class="header_left_wrap">
              <h5>Itscart.in</h5>
              <h5>15 minutes</h5>
              <div class="header_loc">
                <i class="ti ti-home"></i>
                <h5>Home</h5>
                <i class="ti ti-chevron-down"></i>
              </div>
              <p>Ak jha, Girja Colony, Kuenartali, Ranchi, 834002</p>
            </div>
            <div class="header_right_wrap">
              <div
                class="header_right_icon"
                onclick="location.href = 'wallet.html'"
              >
                <img src="../assets/img/icon/wallet.svg" alt="" />

              </div>
              <div
                class="header_right_icon"
                onclick="location.href = 'profile.html'"
              >
                <img src="../assets/img/icon/profile.svg" alt="" />
              </div>
            </div>
          </div>
      
          <div class="search_bar" onclick="location.href = 'search.html'">
            <i class="ti ti-search"></i>

            <input
              type="text"
              placeholder="Search 'Vegetables & Fruits'"
              readonly
            />
            <i class="ti ti-microphone"></i>
          </div>
        </div>
        <div class="category_wrapper">
          <div class="category_icons" id="category">
            <!-- tabs -->
            <div class="category_indicator"></div>
          </div>
        </div>

      </div>

        ...

      <div
        class="offcanvas offcanvas-bottom varient_data_canvas"
        tabindex="-1"
        id="offcanvasVarient"

        <div class="offcanvas-body small">
          <h4>Select Varient</h4>
          <div class="varient_data" id="varientData">

          </div>
        </div>
      </div>

      <div id="cartPopup">

        <div class="cart_left">
          <h6>View cart</h6>
          <p><b id="cartQty">3</b> item</p>
        </div>

        <div class="cart_right">
          <i class="ti ti-chevrons-right"></i>
        </div>

      </div>
    </div>
      <div class="footer_tab">
        <div class="foot_tab" onclick="location.href = 'home.html'">

        <div class="foot_tab" onclick="location.href = 'category.html'">
          <i class="ri-apps-line"></i>
        </div>
        <div class="foot_tab circle"></div>
        <div class="foot_tab" onclick="location.href = 'orders.html'">

        </div>
        <div class="foot_tab" onclick="location.href = 'profile.html'">
